name: flutterarch
description: "Projeto para estudo"
publish_to: 'flutterarch'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  equatable: ^2.0.8
  flutter_bloc: ^9.1.1
  shimmer_animation: ^2.2.2+1
  flutter_modular: ^6.4.1
  get_it: ^9.2.1
  bloc_test: ^10.0.0
  dartz: ^0.10.1
  intl: ^0.19.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
